name: MythicSMP
version: '1.0.0'
main: com.merci.mythicsmp.MythicSMP
api-version: '1.21'
author: Merci
description: Armes et objets uniques et mythiques pour serveur SMP

commands:
  mythicgive:
    description: Donne un objet mythique à un joueur
    usage: /mythicgive <joueur> <id> [quantité]
    permission: mythicsmp.give
  mythiclist:
    description: Liste tous les objets mythiques disponibles
    usage: /mythiclist
    permission: mythicsmp.list
  mythicboss:
    description: Invoque le Gardien Écarlate à ta position
    usage: /mythicboss
    permission: mythicsmp.boss
  mythicauction:
    description: Ouvre le marché entre joueurs
    usage: /mythicauction
    permission: mythicsmp.auction
  mythicsell:
    description: Met en vente l'objet tenu en main
    usage: /mythicsell <prix>
    permission: mythicsmp.auction
  mythicbalance:
    description: Affiche ton solde de pièces
    usage: /mythicbalance
    permission: mythicsmp.auction
  mythicquests:
    description: Affiche les quêtes du jour et ta progression
    usage: /mythicquests
    permission: mythicsmp.quests
  mythicjob:
    description: Choisis ou consulte ton métier
    usage: /mythicjob info | /mythicjob choose <métier>
    permission: mythicsmp.jobs
  mythicjobtop:
    description: Classement des métiers
    usage: /mythicjobtop
    permission: mythicsmp.jobs
  mythicbaltop:
    description: Classement des plus grosses fortunes
    usage: /mythicbaltop
    permission: mythicsmp.auction

permissions:
  mythicsmp.give:
    default: op
  mythicsmp.list:
    default: true
  mythicsmp.boss:
    default: op
  mythicsmp.auction:
    default: true
  mythicsmp.quests:
    default: true
  mythicsmp.jobs:
    default: true
